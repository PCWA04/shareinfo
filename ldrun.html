<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2026 倫敦馬拉松 - 愛愛愛妹六大馬之旅</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入 Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        /* 隱藏捲軸但保留滾動功能 (讓畫面更乾淨) */
        ::-webkit-scrollbar { width: 0px; background: transparent; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen pb-10">

    <!-- App Header -->
    <div class="bg-gradient-to-r from-blue-900 to-red-800 text-white pt-12 pb-6 px-4 shadow-lg sticky top-0 z-10">
        <div class="max-w-md mx-auto">
            <p class="text-sm font-medium opacity-80 mb-1">2026 倫敦馬拉松</p>
            <h1 class="text-2xl font-bold tracking-wider">愛愛愛妹六大馬之旅</h1>
            <div class="flex items-center mt-3 text-xs opacity-90 space-x-4">
                <span class="flex items-center"><i data-lucide="clock" class="w-3 h-3 mr-1"></i> 9天行程</span>
                <span class="flex items-center"><i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> 英國．倫敦</span>
            </div>
        </div>
    </div>

    <!-- Main Content Container -->
    <div class="max-w-md mx-auto p-4 space-y-4 mt-2" id="itinerary-container">
        <!-- 行程卡片會由 JavaScript 動態生成注入這裡 -->
    </div>

    <!-- Info Card -->
    <div class="max-w-md mx-auto px-4">
        <div class="mt-4 bg-blue-50 border border-blue-100 rounded-xl p-5 shadow-sm">
            <div class="flex items-center space-x-2 text-blue-800 mb-3">
                <i data-lucide="info" class="w-5 h-5"></i>
                <h3 class="font-bold">行前注意事項</h3>
            </div>
            <ul class="text-sm text-blue-900/80 space-y-2 pl-5 list-disc">
                <li>請務必攜帶效期內之<span class="font-bold">護照</span>。</li>
                <li>英國電壓為 230V 三叉柱式插頭，請自備轉接頭。</li>
                <li>為響應環保，飯店<span class="text-red-600 font-bold">不提供</span>牙膏、牙刷與紙拖鞋。</li>
                <li>建議備妥感應式信用卡 (或 Apple Pay)，可直接搭乘大眾運輸。</li>
                <li>氣候乾燥且早晚溫差大，請備妥保濕用品與保暖/防雨衣物。</li>
            </ul>
        </div>
    </div>

    <script>
        // 行程資料設定
        const itineraryData = [
            {
                id: 1, day: "Day 1", date: "4/22 (三)", title: "啟程 / 抵達倫敦", theme: "bg-blue-600",
                events: [
                    { time: "06:05", title: "機場集合", desc: "桃園機場第一航廈華航櫃檯辦理 Check-in", icon: "users" },
                    { time: "08:05", title: "起飛 (CI081)", desc: "直飛倫敦希斯洛機場", icon: "plane" },
                    { time: "16:30", title: "抵達倫敦", desc: "接機後搭乘伊麗莎白線前往 EXPO 周邊飯店入住", icon: "train-front" },
                    { time: "晚上", title: "英式晚餐", desc: "品嘗倫敦聞名的炸魚薯條，享受港邊夜景", icon: "utensils" }
                ]
            },
            {
                id: 2, day: "Day 2", date: "4/23 (四)", title: "EXPO / 泰晤士河畔", theme: "bg-red-600",
                events: [
                    { time: "早晨", title: "晨跑", desc: "泰晤士河畔晨跑", icon: "activity" },
                    { time: "09:00 - 12:00", title: "倫敦馬拉松 EXPO", desc: "領取物資，隨後沿泰晤士河畔漫步", icon: "ticket" },
                    { time: "中午", title: "午餐自理", desc: "Borough Market 菠蘿市場自由體驗美食", icon: "utensils" },
                    { time: "下午", title: "市區觀光", desc: "參觀馬拉松終點、牛津大街，造訪 Tracksmith 快閃店", icon: "map-pin" },
                    { time: "18:30", title: "晚餐", desc: "倫敦市區英式酒吧晚餐", icon: "utensils" }
                ]
            },
            {
                id: 3, day: "Day 3", date: "4/24 (五)", title: "白金漢宮 / 大英博物館", theme: "bg-blue-800",
                events: [
                    { time: "07:00 - 08:00", title: "晨跑", desc: "格林威治公園晨跑 (起點附近)", icon: "activity" },
                    { time: "早上", title: "更換飯店", desc: "前往倫敦市區飯店 (St Giles Hotel) Check-in", icon: "home" },
                    { time: "11:00 - 12:30", title: "白金漢宮", desc: "若天氣允許，欣賞衛兵交接儀式", icon: "camera" },
                    { time: "中午", title: "下午茶", desc: "體驗倫敦最出名的英式下午茶", icon: "utensils" },
                    { time: "15:00 - 17:00", title: "大英博物館", desc: "探索五千年的歷史", icon: "map" },
                    { time: "傍晚", title: "晚餐與夜跑", desc: "SOHO區晚餐 (格格/龍哥傍晚抵達)，飯後 5K 夜跑", icon: "activity" }
                ]
            },
            {
                id: 4, day: "Day 4", date: "4/25 (六)", title: "賽前準備 / 音樂劇", theme: "bg-indigo-600",
                events: [
                    { time: "早晨", title: "晨跑", desc: "海德公園散步/晨跑", icon: "activity" },
                    { time: "早上", title: "自由活動", desc: "好好休息，布希隨旁協助 (格格/龍哥前往 EXPO)", icon: "info" },
                    { time: "14:30 - 17:00", title: "歌劇魅影", desc: "觀賞經典音樂劇", icon: "music" },
                    { time: "18:30 - 19:30", title: "晚餐", desc: "中國城酒家晚餐，補充碳水準備賽事！", icon: "utensils" }
                ]
            },
            {
                id: 5, day: "Day 5", date: "4/26 (日)", title: "🔥 倫敦馬拉松賽事日", theme: "bg-red-600",
                events: [
                    { time: "早上", title: "前往起點", desc: "搭乘火車 (約50分) 直達格林威治公園起點", icon: "train-front" },
                    { time: "白天", title: "倫敦馬拉松", desc: "迎接激動人心的比賽！限時 8 小時", icon: "award" },
                    { time: "下午", title: "賽後休息", desc: "抵達終點 (白金漢宮) 後，步行返回飯店", icon: "home" },
                    { time: "18:00", title: "慶功宴", desc: "麻辣火鍋慶功！不醉不歸！", icon: "utensils" }
                ]
            },
            {
                id: 6, day: "Day 6", date: "4/27 (一)", title: "巨石陣 / 巴斯", theme: "bg-amber-600",
                events: [
                    { time: "09:30", title: "出發", desc: "乘車啟程 (若想刻獎牌則中午出發)", icon: "train-front" },
                    { time: "12:00 - 13:30", title: "巨石陣", desc: "參觀史前遺跡", icon: "map-pin" },
                    { time: "13:45 - 15:00", title: "午餐", desc: "當地餐館享用午餐", icon: "utensils" },
                    { time: "16:00", title: "巴斯市區", desc: "抵達巴斯 (Apex City of Bath Hotel)，漫步羅馬浴場周邊", icon: "camera" }
                ]
            },
            {
                id: 7, day: "Day 7", date: "4/28 (二)", title: "科茲窩 / 牛津", theme: "bg-green-600",
                events: [
                    { time: "07:00 - 08:00", title: "晨跑", desc: "巴斯古典小城慢跑", icon: "activity" },
                    { time: "09:30", title: "出發", desc: "前往英格蘭最迷人鄉村", icon: "train-front" },
                    { time: "11:00", title: "科茲窩", desc: "典型英式鄉村漫遊", icon: "camera" },
                    { time: "12:30 - 14:00", title: "午餐", desc: "享用傳統英式餐點", icon: "utensils" },
                    { time: "15:00 - 17:00", title: "牛津 Outlet", desc: "名品購物村血拚", icon: "shopping-bag" },
                    { time: "18:00", title: "牛津市區", desc: "抵達牛津 (The Store Hotel)，感受學術氛圍", icon: "home" }
                ]
            },
            {
                id: 8, day: "Day 8", date: "4/29 (三)", title: "哈利波特 / 返家", theme: "bg-purple-600",
                events: [
                    { time: "07:00 - 08:00", title: "晨跑", desc: "牛津大學城慢跑", icon: "activity" },
                    { time: "09:30", title: "出發", desc: "展開今日行程", icon: "map-pin" },
                    { time: "15:00", title: "哈利波特影城", desc: "沉浸奇幻魔法世界 (Warner Bros. Studio)", icon: "ticket" },
                    { time: "19:00", title: "抵達機場", desc: "希斯洛機場 (LHR) 辦理登機", icon: "plane" },
                    { time: "21:10", title: "搭機返台", desc: "搭乘華航 CI082", icon: "plane" }
                ]
            },
            {
                id: 9, day: "Day 9", date: "4/30 (四)", title: "抵達台灣", theme: "bg-blue-500",
                events: [
                    { time: "17:40", title: "抵達台灣", desc: "降落桃園機場，帶著滿滿回憶回家！", icon: "home" }
                ]
            }
        ];

        // 渲染行程 HTML
        const container = document.getElementById('itinerary-container');
        
        let htmlContent = '';
        itineraryData.forEach((day, index) => {
            // 預設展開第一天 (Day 1)
            const isExpanded = index === 0;
            const contentClass = isExpanded ? 'max-h-[1000px] opacity-100' : 'max-h-0 opacity-0';
            const iconName = isExpanded ? 'chevron-up' : 'chevron-down';

            let eventsHtml = '';
            day.events.forEach(event => {
                eventsHtml += `
                    <div class="relative pl-6">
                        <div class="absolute -left-[17px] top-0.5 bg-white border-2 border-slate-200 rounded-full p-1.5 text-slate-500">
                            <i data-lucide="${event.icon}" class="w-3.5 h-3.5"></i>
                        </div>
                        <div class="flex flex-col">
                            <span class="text-xs font-bold text-blue-600 mb-1">${event.time}</span>
                            <h3 class="text-sm font-bold text-slate-800 mb-1">${event.title}</h3>
                            <p class="text-sm text-slate-600 leading-relaxed">${event.desc}</p>
                        </div>
                    </div>
                `;
            });

            htmlContent += `
                <div class="bg-white rounded-xl shadow-sm overflow-hidden border border-slate-100 transition-all duration-300 mb-4">
                    <button class="accordion-btn w-full flex items-center justify-between p-4 text-left focus:outline-none" data-target="content-${day.id}">
                        <div class="flex items-center space-x-4">
                            <div class="${day.theme} text-white font-bold text-sm px-3 py-1.5 rounded-lg shadow-sm w-16 text-center">
                                ${day.date}
                            </div>
                            <div>
                                <p class="text-xs text-slate-500 font-medium mb-0.5">${day.day}</p>
                                <h2 class="text-base font-bold text-slate-800">${day.title}</h2>
                            </div>
                        </div>
                        <div class="text-slate-400">
                            <i data-lucide="${iconName}" class="w-6 h-6 chevron-icon" id="icon-${day.id}"></i>
                        </div>
                    </button>
                    <div id="content-${day.id}" class="accordion-content transition-all duration-300 ease-in-out overflow-hidden ${contentClass}">
                        <div class="p-4 pt-0 border-t border-slate-50 bg-slate-50/50">
                            <div class="relative border-l-2 border-slate-200 ml-4 mt-4 space-y-6 pb-4">
                                ${eventsHtml}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        });

        container.innerHTML = htmlContent;

        // 初始化 Lucide Icons
        lucide.createIcons();

        // 設定手風琴 (Accordion) 點擊事件
        const buttons = document.querySelectorAll('.accordion-btn');
        buttons.forEach(button => {
            button.addEventListener('click', () => {
                const targetId = button.getAttribute('data-target');
                const content = document.getElementById(targetId);
                const iconElement = button.querySelector('.chevron-icon');
                
                const isCurrentlyOpen = content.classList.contains('max-h-[1000px]');

                // 先關閉所有其他的
                document.querySelectorAll('.accordion-content').forEach(el => {
                    el.classList.remove('max-h-[1000px]', 'opacity-100');
                    el.classList.add('max-h-0', 'opacity-0');
                });
                
                // 將所有的 icon 換成向下
                document.querySelectorAll('.chevron-icon').forEach(icon => {
                    const iconName = icon.getAttribute('data-lucide');
                    if (iconName === 'chevron-up') {
                         icon.setAttribute('data-lucide', 'chevron-down');
                    }
                });

                // 如果點擊的本來是關閉的，就打開它
                if (!isCurrentlyOpen) {
                    content.classList.remove('max-h-0', 'opacity-0');
                    content.classList.add('max-h-[1000px]', 'opacity-100');
                    iconElement.setAttribute('data-lucide', 'chevron-up');
                }

                // 重新渲染被改變的 Icons
                lucide.createIcons();
            });
        });
    </script>
</body>
</html>
